spring.application.name=votecoop

# H2 file-based database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/votecoop;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 web console (accessible at /h2-console during development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URL base da aplicacao
app.base-url=http://localhost:8080

# valor padrao (em minutos) para duracao de sessoes em minutos
app.sessao.duracao-padrao-minutos=1

# URL base da API de verificacao de associados
app.usercheck.base-url=http://localhost:8090
